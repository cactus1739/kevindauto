name: Build & Deploy to Hostinger

# Tự động build và upload lên Hostinger qua FTP.
# Secrets cần có: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD (deploy)
#                 WOO_URL, WOO_KEY, WOO_SECRET (đồng bộ sản phẩm từ WooCommerce)
# (Settings → Secrets and variables → Actions)

on:
  push:
    branches: [main]
  workflow_dispatch: # nút "Run workflow" — bấm để xuất bản ngay sau khi sửa admin
  schedule:
    - cron: '0 */3 * * *' # tự đồng bộ + deploy mỗi 3 giờ (sửa admin sẽ tự lên trong tối đa 3h)

# Tránh 2 workflow FTP chạy cùng lúc (Hostinger giới hạn kết nối FTP đồng thời)
concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài dependencies
        run: npm ci

      - name: Đồng bộ sản phẩm từ WooCommerce
        run: npm run woo:sync
        continue-on-error: true # Woo lỗi/tạm ngừng thì dùng dữ liệu đã commit (không chặn deploy)
        env:
          WOO_URL: ${{ secrets.WOO_URL }}
          WOO_KEY: ${{ secrets.WOO_KEY }}
          WOO_SECRET: ${{ secrets.WOO_SECRET }}

      - name: Build production
        run: npm run build

      - name: Deploy lên Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./dist/
          server-dir: /public_html/
          # Xoá file cũ không còn trong dist (giữ web sạch). Bỏ nếu không muốn.
          dangerous-clean-slate: false
