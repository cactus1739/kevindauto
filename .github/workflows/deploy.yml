name: Build & Deploy to Hostinger

# Tự động build và upload lên Hostinger qua FTP mỗi khi push lên nhánh main.
# Cần cấu hình 3 secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# (Settings → Secrets and variables → Actions)

on:
  push:
    branches: [main]
  workflow_dispatch: # cho phép chạy thủ công từ tab Actions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài dependencies
        run: npm ci

      - name: Build production
        run: npm run build

      - name: Deploy lên Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./dist/
          server-dir: /public_html/
          # Xoá file cũ không còn trong dist (giữ web sạch). Bỏ nếu không muốn.
          dangerous-clean-slate: false
